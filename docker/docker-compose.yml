version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo_net

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    restart: unless-stopped
    ports:
      - "6378:6378"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo_net

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: todo_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: todo_db
      REDIS_URL: redis://redis:6378
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - todo_net

  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    container_name: todo_worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6378
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - todo_net

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: todo_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo_net

volumes:
  pgdata:

networks:
  todo_net:
    driver: bridge
